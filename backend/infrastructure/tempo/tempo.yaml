stream_over_http_enabled: true
server:
  http_listen_port: 3200
distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
ingester:
  trace_idle_period: 10s
  max_block_duration: 5m
compactor:
  compaction:
    block_retention: 24h
metrics_generator:
  processor:
    service_graphs: {}
    span_metrics:
      dimensions:
        - gen_ai.operation.name
        - gen_ai.request.model
        - gen_ai.tool.name
        - gen_ai.agent.id
        - mastra.span.type
        - mastra.metadata.environment
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]
storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
