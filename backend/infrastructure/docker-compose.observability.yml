services:
  prometheus:
    image: prom/prometheus:v3.11.3
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    command:
      - --web.enable-remote-write-receiver
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    extra_hosts:
      - "osai-ai-data-model:host-gateway"
      - "osai-ai-agents:host-gateway"
    networks:
      - default

  loki:
    image: grafana/loki:3.7.1
    ports:
      - "${LOKI_PORT:-3100}:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki/local-config.yaml:/etc/loki/local-config.yaml
      - loki-data:/loki
    networks:
      - default

  alloy:
    image: grafana/alloy:v1.16.0
    user: root
    ports:
      - "${ALLOY_UI_PORT:-12345}:12345"  # Alloy UI
      - "${ALLOY_OTLP_GRPC_PORT:-4317}:4317"    # OTLP gRPC (traces + logs from apps)
      - "${ALLOY_OTLP_HTTP_PORT:-4318}:4318"    # OTLP HTTP (traces + logs from apps)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./alloy/config.alloy:/etc/alloy/config.alloy
      - alloy-data:/var/lib/alloy/data
    command: run --stability.level=experimental --storage.path=/var/lib/alloy/data --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    networks:
      - default

  tempo:
    image: grafana/tempo:2.7.0
    ports:
      - "${TEMPO_HTTP_PORT:-3200}:3200"
    command:
      - -config.file=/etc/tempo-config.yaml
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo-config.yaml
      - tempo-data:/var/tempo
    networks:
      - default

  grafana:
    image: grafana/grafana:13.0.1
    ports:
      - "${GRAFANA_PORT:-3333}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards/local
    networks:
      - default

volumes:
  alloy-data:
  loki-data:
  tempo-data:
